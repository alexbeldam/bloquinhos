name: Build and Release

on:
  push:
    branches:
      - 'release/v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux
            asset_name: tetris-linux-x64.tar.gz
          - os: windows-latest
            artifact_name: windows
            asset_name: tetris-win64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create .env file from Secrets
        shell: bash
        run: echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --windowed --name "tetris" --icon="assets/icon.ico" --add-data ".env;." src/main.py
          mkdir dist_zip
          cp dist/tetris.exe dist_zip/
          cp -r assets dist_zip/
          compress-archive -Path dist_zip/* -DestinationPath ${{ matrix.asset_name }}

      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --onefile --windowed --name "tetris" --add-data ".env:." src/main.py
          mkdir dist_tar
          cp dist/tetris dist_tar/
          cp -r assets dist_tar/
          chmod +x dist_tar/tetris
          tar -czf ${{ matrix.asset_name }} -C dist_tar .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_name }}

  create_release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get version from branch
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/heads/release/v}" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: |
            linux/tetris-linux-x64.tar.gz
            windows/tetris-win64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
