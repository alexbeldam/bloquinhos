name: Build and Release

on:
  push:
    branches:
      - 'release/v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: linux
          - os: windows-latest
            artifact_name: windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame pymongo python-dotenv cryptography certifi pyinstaller

      - name: Create .env file from Secrets
        shell: bash
        run: echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onedir --windowed --name "bloquinhos" --paths src --icon="assets/img/icon.ico" --add-data ".env;." src/main.py

      - name: Compile Inno Setup (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".Replace("release/v", "")
          & "iscc.exe" /DMyAppVersion=$version install_script.iss
          mv output/BloquinhosSetup.exe Bloquinhos-Installer-Win64.exe

      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          pyinstaller --onedir --windowed --name "bloquinhos" --paths src --add-data ".env:." src/main.py

      - name: Install nFPM (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update && sudo apt-get install nfpm

      - name: Package DEB and RPM
        if: matrix.os == 'ubuntu-22.04'
        run: |
          export VERSION=${GITHUB_REF#refs/heads/release/v}
          nfpm pkg --packager deb --target bloquinhos-linux.deb
          nfpm pkg --packager rpm --target bloquinhos-linux.rpm

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            *.exe
            *.deb
            *.rpm

  create_release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get version from branch
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/heads/release/v}" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Bloquinhos - v${{ env.VERSION }}
          generate_release_notes: true
          body: |
            ## 🎮 Como Jogar

            ### 🪟 Windows
            1. Baixe o arquivo `Bloquinhos-Installer-Win64.exe`.
            2. **Importante:** Clique com o botão direito no arquivo -> **Propriedades** -> Marque a caixa **Desbloquear** (Unblock) e clique em OK.
            3. Execute o instalador e siga as instruções. O jogo aparecerá no seu Menu Iniciar!

            ### 🐧 Linux (Fedora/Ubuntu)
            1. Baixe o arquivo correspondente (`.rpm` para Fedora/KDE ou `.deb` para Ubuntu).
            2. Clique duas vezes para abrir na sua Loja de Software e clique em **Instalar**.
            3. Procure por "Bloquinhos" no seu menu de aplicativos.
          files: |
            windows/Bloquinhos-Installer-Win64.exe
            linux/bloquinhos-linux.deb
            linux/bloquinhos-linux.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete Release Branch
        if: success()
        uses: dawidd6/action-delete-branch@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branches: ${{ github.ref_name }}