name: Test Build and Package

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  test_build:
    name: Test Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: test-linux
          - os: windows-latest
            artifact_name: test-windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: block_env
          environment-file: environment.yml
          auto-activate-base: false

      - name: Create .env file from Secrets
        run: echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Install nFPM
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          VERSION=v2.37.1
          curl -fL https://github.com/goreleaser/nfpm/releases/download/${VERSION}/nfpm_${VERSION#v}_amd64.deb -o nfpm.deb
          sudo dpkg -i nfpm.deb
          nfpm --version

      - name: Set VERSION from pyproject
        run: echo "VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)" >> $GITHUB_ENV

      - name: Build executable
        run: make build

      - name: Package artifacts
        run: make package VERSION=${{ env.VERSION }}

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.run_number }}
          retention-days: 7
          path: |
            *.exe
            *.deb
            *.rpm